name: Build and Release Binaries

on:
  push:
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies (build extra)
        run: uv sync --extra build

      - name: Build single binary
        run: uv run pyinstaller hsa_tracker.spec --clean

      - name: Prepare artifact
        id: prep
        shell: bash
        run: |
          OS="${{ runner.os }}"
          EXT=""
          if [ "$OS" = "Windows" ]; then EXT=".exe"; fi
          SRC="dist/hsa-tracker${EXT}"
          DEST="hsa-tracker-${OS,,}${EXT}"
          mkdir -p upload
          cp "$SRC" "upload/$DEST"
          echo "asset=upload/$DEST" >> "$GITHUB_OUTPUT"
          echo "name=$DEST" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prep.outputs.name }}
          path: ${{ steps.prep.outputs.asset }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    outputs:
      release_needed: ${{ steps.meta.outputs.release_needed }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Determine release conditions
        id: meta
        run: |
          release_needed=false
          tag_name=""
          release_name=""
          prerelease=true

          if [ "${IS_TAG}" = "true" ]; then
            release_needed=true
            tag_name="${REF_NAME}"
            release_name="Release ${tag_name}"
            prerelease=false
          elif [ "${IS_PR}" = "true" ] && [ "${LABEL_MATCH}" = "true" ]; then
            release_needed=true
            tag_name="pr-${PR_NUMBER}-${{ github.run_id }}"
            release_name="PR #${PR_NUMBER} preview"
            prerelease=true
          fi

          echo "release_needed=${release_needed}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
        env:
          IS_TAG: ${{ github.ref_type == 'tag' }}
          REF_NAME: ${{ github.ref_name }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          LABEL_MATCH: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'release_newver') || false }}

      - name: Download artifacts
        if: steps.meta.outputs.release_needed == 'true'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        if: steps.meta.outputs.release_needed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: artifacts/**/*
